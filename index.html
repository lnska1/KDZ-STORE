<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KDZ Football</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Cairo:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0f1e;font-family:'Cairo',sans-serif;color:#fff;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

#screen-menu,#screen-game,#screen-over{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hidden{display:none!important;}

/* MENU */
#screen-menu{background:radial-gradient(ellipse at 50% 0%,rgba(0,200,100,0.15),transparent 60%),#0a0f1e;}
.logo-title{font-family:'Exo 2',sans-serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:900;letter-spacing:4px;color:#00e676;text-shadow:0 0 40px rgba(0,230,118,0.5);margin-bottom:.3rem;}
.logo-sub{font-size:1rem;color:#aaa;letter-spacing:6px;margin-bottom:3rem;}
.menu-btn{background:transparent;border:2px solid #00e676;color:#00e676;padding:.9rem 3rem;font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:700;border-radius:4px;cursor:pointer;margin:.4rem;transition:all .2s;min-width:220px;}
.menu-btn:hover,.menu-btn.active{background:#00e676;color:#0a0f1e;box-shadow:0 0 25px rgba(0,230,118,0.4);}
.controls-hint{margin-top:2rem;color:#555;font-size:.8rem;text-align:center;line-height:2;}
.controls-hint span{color:#00e676;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.5rem;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,230,118,0.2);}
.team-score{display:flex;align-items:center;gap:.8rem;}
.team-name{font-family:'Exo 2',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:2px;}
.score-box{font-family:'Exo 2',sans-serif;font-size:2rem;font-weight:900;min-width:40px;text-align:center;}
.score-sep{font-size:1.5rem;color:#444;}
#timer-box{font-family:'Exo 2',sans-serif;font-size:1.3rem;font-weight:900;color:#ffd700;}
.power-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.power-label{font-size:.65rem;color:#aaa;letter-spacing:1px;}
.power-bar{width:100px;height:8px;background:#222;border-radius:4px;overflow:hidden;}
.power-fill{height:100%;width:0%;background:linear-gradient(90deg,#00e676,#ffd700,#ff4444);transition:width .05s;}

/* CANVAS */
#gameCanvas{display:block;border:2px solid rgba(0,230,118,0.3);box-shadow:0 0 40px rgba(0,230,118,0.1);}

/* GAME OVER */
#screen-over{background:rgba(0,0,0,0.92);z-index:200;}
.over-title{font-family:'Exo 2',sans-serif;font-size:3rem;font-weight:900;margin-bottom:.5rem;}
.over-result{font-size:1.2rem;color:#aaa;margin-bottom:.5rem;}
.over-score{font-family:'Exo 2',sans-serif;font-size:4rem;font-weight:900;color:#00e676;margin-bottom:2rem;}

/* GOAL FLASH */
#goal-flash{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .2s;}
#goal-flash.show{opacity:1;}
.goal-text{font-family:'Exo 2',sans-serif;font-size:8rem;font-weight:900;color:#ffd700;text-shadow:0 0 60px rgba(255,215,0,0.8),-4px 4px 0 #000;animation:goalBounce .4s ease;}
@keyframes goalBounce{0%{transform:scale(0.3) rotate(-10deg);}60%{transform:scale(1.2) rotate(3deg);}100%{transform:scale(1) rotate(0deg);}}

/* PAUSE */
#pause-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#pause-overlay.hidden{display:none;}
.pause-text{font-family:'Exo 2',sans-serif;font-size:3rem;font-weight:900;color:#fff;}
</style>
</head>
<body>

<!-- MENU -->
<div id="screen-menu">
  <div class="logo-title">KDZ FOOTBALL</div>
  <div class="logo-sub">⚽ لعبة كرة القدم</div>
  <button class="menu-btn" onclick="startGame(1)">🕹️ لاعب واحد (ضد AI)</button>
  <button class="menu-btn" onclick="startGame(2)">👥 لاعبان (نفس الجهاز)</button>
  <div class="controls-hint">
    <b>لاعب 1:</b> <span>WASD</span> للحركة | <span>Space</span> تسديد/تمرير<br/>
    <b>لاعب 2:</b> <span>←→↑↓</span> للحركة | <span>Enter</span> تسديد<br/>
    <b>كنترول:</b> <span>Stick يسار</span> حركة | <span>X/A</span> تسديد | <span>Start</span> إيقاف مؤقت
  </div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="team-score">
    <div class="team-name" id="team1name" style="color:#00e676">KDZ FC</div>
    <div class="score-box" id="score1" style="color:#00e676">0</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div id="timer-box">90:00</div>
    <div class="power-bar-wrap">
      <div class="power-label">POWER</div>
      <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
    </div>
  </div>
  <div class="team-score" style="flex-direction:row-reverse;">
    <div class="team-name" id="team2name" style="color:#ff4444">CPU / P2</div>
    <div class="score-box" id="score2" style="color:#ff4444">0</div>
  </div>
</div>

<!-- CANVAS -->
<canvas id="gameCanvas" class="hidden"></canvas>

<!-- GOAL FLASH -->
<div id="goal-flash"><div class="goal-text">GOAL! ⚽</div></div>

<!-- PAUSE -->
<div id="pause-overlay" class="hidden"><div class="pause-text">⏸ PAUSE</div></div>

<!-- GAME OVER -->
<div id="screen-over" class="hidden">
  <div class="over-title" id="over-title">نهاية المباراة</div>
  <div class="over-result" id="over-result">النتيجة النهائية</div>
  <div class="over-score" id="over-score">0 - 0</div>
  <button class="menu-btn" onclick="restartGame()">🔄 مباراة جديدة</button>
  <button class="menu-btn" onclick="backToMenu()">🏠 القائمة الرئيسية</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ── CONFIG ──
const W = Math.min(window.innerWidth, 900);
const H = Math.min(window.innerHeight - 60, 550);
canvas.width = W; canvas.height = H;

const FIELD_PAD = 40;
const GOAL_W = 12;
const GOAL_H = H * 0.28;
const GOAL_Y = (H - GOAL_H) / 2;
const PLAYER_R = 14;
const BALL_R = 8;
const FRICTION = 0.985;
const PLAYER_SPEED = 3.2;
const AI_SPEED = 2.6;
const SHOOT_POWER_MAX = 18;
const GAME_DURATION = 90; // seconds

let gameMode = 1;
let gameState = 'menu'; // menu, playing, paused, over
let score = [0, 0];
let gameTime = 0;
let lastTime = 0;
let animId;
let powerCharge = 0;
let isPowerCharging = false;
let goalFlashTimer = 0;

// Keys
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='Escape'||e.code==='KeyP') togglePause(); if(e.code==='Space'||e.code==='Enter') e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Gamepad
let gp = null;
window.addEventListener('gamepadconnected', e => { gp = e.gamepad; });
window.addEventListener('gamepaddisconnected', () => { gp = null; });

function getGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for(let p of pads) if(p) return p;
  return null;
}

// ── ENTITIES ──
let ball, players;

function initGame() {
  ball = { x: W/2, y: H/2, vx: 0, vy: 0, r: BALL_R };
  players = [
    { x: W*0.25, y: H/2, vx:0, vy:0, r:PLAYER_R, team:0, hasBall:false, color:'#00e676', shirt:'#004d20' },
    { x: W*0.75, y: H/2, vx:0, vy:0, r:PLAYER_R, team:1, hasBall:false, color:'#ff4444', shirt:'#4d0000' },
  ];
  // add CPU teammates / AI players
  players.push(
    { x:W*0.3, y:H*0.3, vx:0,vy:0, r:PLAYER_R, team:0, ai:true, color:'#00e676', shirt:'#004d20' },
    { x:W*0.3, y:H*0.7, vx:0,vy:0, r:PLAYER_R, team:0, ai:true, color:'#00e676', shirt:'#004d20' },
    { x:W*0.7, y:H*0.3, vx:0,vy:0, r:PLAYER_R, team:1, ai:true, color:'#ff4444', shirt:'#4d0000' },
    { x:W*0.7, y:H*0.7, vx:0,vy:0, r:PLAYER_R, team:1, ai:true, color:'#ff4444', shirt:'#4d0000' },
  );
  gameTime = GAME_DURATION;
  powerCharge = 0;
}

function startGame(mode) {
  gameMode = mode;
  initGame();
  gameState = 'playing';
  document.getElementById('screen-menu').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  canvas.classList.remove('hidden');
  document.getElementById('score1').textContent = '0';
  document.getElementById('score2').textContent = '0';
  document.getElementById('team2name').textContent = mode===2 ? 'لاعب 2' : 'CPU';
  lastTime = performance.now();
  cancelAnimationFrame(animId);
  loop(lastTime);
}

function backToMenu() {
  gameState = 'menu';
  document.getElementById('screen-over').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  canvas.classList.add('hidden');
  document.getElementById('screen-menu').classList.remove('hidden');
  cancelAnimationFrame(animId);
}

function restartGame() {
  document.getElementById('screen-over').classList.add('hidden');
  startGame(gameMode);
}

function togglePause() {
  if(gameState==='playing') { gameState='paused'; document.getElementById('pause-overlay').classList.remove('hidden'); }
  else if(gameState==='paused') { gameState='playing'; document.getElementById('pause-overlay').classList.add('hidden'); lastTime=performance.now(); loop(lastTime); }
}

// ── MAIN LOOP ──
function loop(ts) {
  if(gameState!=='playing') return;
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  update(dt);
  render();
  animId = requestAnimationFrame(loop);
}

// ── UPDATE ──
function update(dt) {
  const pad = getGamepad();

  // Timer
  gameTime -= dt;
  if(gameTime <= 0) { gameTime = 0; endGame(); return; }
  const mins = Math.floor(gameTime/60);
  const secs = Math.floor(gameTime%60);
  document.getElementById('timer-box').textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

  // Player 1 input
  const p1 = players[0];
  let dx1=0, dy1=0;
  if(keys['KeyW']||keys['ArrowUp']&&gameMode===1) dy1=-1;
  if(keys['KeyS']||keys['ArrowDown']&&gameMode===1) dy1=1;
  if(keys['KeyA']||keys['ArrowLeft']&&gameMode===1) dx1=-1;
  if(keys['KeyD']||keys['ArrowRight']&&gameMode===1) dx1=1;

  // Gamepad P1
  if(pad) {
    const ax = pad.axes[0], ay = pad.axes[1];
    if(Math.abs(ax)>0.15) dx1=ax;
    if(Math.abs(ay)>0.15) dy1=ay;
  }

  const len1 = Math.sqrt(dx1*dx1+dy1*dy1)||1;
  p1.vx = (dx1/len1)*PLAYER_SPEED;
  p1.vy = (dy1/len1)*PLAYER_SPEED;
  if(!dx1&&!dy1) { p1.vx*=0.7; p1.vy*=0.7; }

  // Shoot P1
  const shootP1 = keys['Space'] || (pad && (pad.buttons[0]?.pressed || pad.buttons[2]?.pressed));
  if(shootP1) {
    isPowerCharging = true;
    powerCharge = Math.min(powerCharge + dt*2.5, 1);
  } else if(isPowerCharging) {
    isPowerCharging = false;
    const near = nearestBall(p1);
    if(near < PLAYER_R + BALL_R + 15) {
      const angle = Math.atan2(ball.y - p1.y, ball.x - p1.x);
      const power = 6 + powerCharge * SHOOT_POWER_MAX;
      ball.vx = Math.cos(angle) * power;
      ball.vy = Math.sin(angle) * power;
    }
    powerCharge = 0;
  }
  document.getElementById('powerFill').style.width = (powerCharge*100)+'%';

  // Player 2 input (human or AI)
  const p2 = players[1];
  if(gameMode===2) {
    let dx2=0, dy2=0;
    if(keys['ArrowUp']) dy2=-1;
    if(keys['ArrowDown']) dy2=1;
    if(keys['ArrowLeft']) dx2=-1;
    if(keys['ArrowRight']) dx2=1;
    const len2 = Math.sqrt(dx2*dx2+dy2*dy2)||1;
    p2.vx = dx2 ? (dx2/len2)*PLAYER_SPEED : p2.vx*0.7;
    p2.vy = dy2 ? (dy2/len2)*PLAYER_SPEED : p2.vy*0.7;
    if(keys['Enter']||keys['NumpadEnter']) {
      const near2 = nearestBall(p2);
      if(near2 < PLAYER_R + BALL_R + 15) {
        const angle = Math.atan2(ball.y - p2.y, ball.x - p2.x);
        ball.vx = Math.cos(angle)*14;
        ball.vy = Math.sin(angle)*14;
      }
    }
  } else {
    // CPU AI
    aiControl(p2, 1, dt);
  }

  // AI teammates
  for(let i=2;i<players.length;i++) {
    const pl = players[i];
    aiControl(pl, pl.team, dt);
  }

  // Move players
  for(const pl of players) {
    pl.x += pl.vx;
    pl.y += pl.vy;
    pl.x = Math.max(FIELD_PAD+pl.r, Math.min(W-FIELD_PAD-pl.r, pl.x));
    pl.y = Math.max(FIELD_PAD+pl.r, Math.min(H-FIELD_PAD-pl.r, pl.y));
  }

  // Ball physics
  ball.vx *= FRICTION;
  ball.vy *= FRICTION;
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Ball wall bounce
  if(ball.y - ball.r < FIELD_PAD) { ball.y = FIELD_PAD+ball.r; ball.vy *= -0.7; }
  if(ball.y + ball.r > H-FIELD_PAD) { ball.y = H-FIELD_PAD-ball.r; ball.vy *= -0.7; }

  // Goal detection
  // Left goal (team 1 scores)
  if(ball.x - ball.r < FIELD_PAD + GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y+GOAL_H) {
    score[1]++; document.getElementById('score2').textContent = score[1];
    flashGoal(); resetBall();
  }
  // Right goal (team 0 scores)
  if(ball.x + ball.r > W-FIELD_PAD - GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y+GOAL_H) {
    score[0]++; document.getElementById('score1').textContent = score[0];
    flashGoal(); resetBall();
  }

  // Ball side bounce
  if(ball.x - ball.r < FIELD_PAD) { ball.x = FIELD_PAD+ball.r; ball.vx *= -0.7; }
  if(ball.x + ball.r > W-FIELD_PAD) { ball.x = W-FIELD_PAD-ball.r; ball.vx *= -0.7; }

  // Player-ball collision
  for(const pl of players) {
    const dist = Math.hypot(ball.x-pl.x, ball.y-pl.y);
    if(dist < pl.r + ball.r) {
      const angle = Math.atan2(ball.y-pl.y, ball.x-pl.x);
      const overlap = pl.r + ball.r - dist;
      ball.x += Math.cos(angle)*overlap;
      ball.y += Math.sin(angle)*overlap;
      const speed = Math.hypot(ball.vx, ball.vy);
      ball.vx = Math.cos(angle)*(speed+1.5);
      ball.vy = Math.sin(angle)*(speed+1.5);
    }
  }

  // Goal flash timer
  if(goalFlashTimer > 0) { goalFlashTimer -= dt; if(goalFlashTimer<=0) document.getElementById('goal-flash').classList.remove('show'); }
}

function nearestBall(pl) { return Math.hypot(ball.x-pl.x, ball.y-pl.y); }

function aiControl(pl, team, dt) {
  const speed = team===1 ? AI_SPEED : AI_SPEED*0.9;
  const hasBall = nearestBall(pl) < PLAYER_R + BALL_R + 20;
  let tx, ty;

  if(hasBall) {
    // Shoot toward enemy goal
    tx = team===0 ? W-FIELD_PAD-20 : FIELD_PAD+20;
    ty = H/2;
    const angle = Math.atan2(ty-pl.y, tx-pl.x);
    ball.vx = Math.cos(angle)*(10+Math.random()*4);
    ball.vy = Math.sin(angle)*(Math.random()*6-3);
  } else {
    // Chase ball with slight offset
    const bx = ball.x + ball.vx*8;
    const by = ball.y + ball.vy*8;
    // Defensive position if ball is on own half
    const ownHalf = team===0 ? ball.x < W/2 : ball.x > W/2;
    if(ownHalf) {
      tx = bx; ty = by;
    } else {
      tx = team===0 ? W*0.55 : W*0.45;
      ty = H/2 + (pl.y > H/2 ? 60 : -60);
    }
  }

  const ddx = tx - pl.x, ddy = ty - pl.y;
  const d = Math.hypot(ddx,ddy)||1;
  if(d > 5) { pl.vx = (ddx/d)*speed; pl.vy = (ddy/d)*speed; }
  else { pl.vx*=0.5; pl.vy*=0.5; }
}

function resetBall() {
  ball.x = W/2; ball.y = H/2; ball.vx = 0; ball.vy = 0;
  players[0].x = W*0.25; players[0].y = H/2;
  players[1].x = W*0.75; players[1].y = H/2;
}

function flashGoal() {
  goalFlashTimer = 1.5;
  document.getElementById('goal-flash').classList.add('show');
}

function endGame() {
  gameState = 'over';
  canvas.classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  const s = document.getElementById('screen-over');
  s.classList.remove('hidden');
  document.getElementById('over-score').textContent = `${score[0]} - ${score[1]}`;
  let result = '';
  if(score[0]>score[1]) result = '🏆 فاز KDZ FC!';
  else if(score[1]>score[0]) result = `🏆 فاز ${gameMode===2?'لاعب 2':'CPU'}!`;
  else result = '🤝 تعادل!';
  document.getElementById('over-result').textContent = result;
}

// ── RENDER ──
function render() {
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = '#0d1f0d';
  ctx.fillRect(0,0,W,H);

  // Field stripes
  const stripeW = (W-FIELD_PAD*2)/8;
  for(let i=0;i<8;i++) {
    ctx.fillStyle = i%2===0 ? '#0d1f0d' : '#0f240f';
    ctx.fillRect(FIELD_PAD+i*stripeW, FIELD_PAD, stripeW, H-FIELD_PAD*2);
  }

  // Field border
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(FIELD_PAD, FIELD_PAD, W-FIELD_PAD*2, H-FIELD_PAD*2);

  // Center line
  ctx.beginPath();
  ctx.moveTo(W/2, FIELD_PAD);
  ctx.lineTo(W/2, H-FIELD_PAD);
  ctx.strokeStyle='rgba(255,255,255,0.4)';
  ctx.stroke();

  // Center circle
  ctx.beginPath();
  ctx.arc(W/2, H/2, 60, 0, Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.4)';
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W/2,H/2,4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fill();

  // Penalty areas
  const paW=80, paH=160;
  ctx.strokeStyle='rgba(255,255,255,0.35)';
  ctx.strokeRect(FIELD_PAD, H/2-paH/2, paW, paH);
  ctx.strokeRect(W-FIELD_PAD-paW, H/2-paH/2, paW, paH);

  // Goals
  // Left goal
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(FIELD_PAD-GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
  ctx.strokeStyle='#fff';
  ctx.lineWidth=3;
  ctx.strokeRect(FIELD_PAD-GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
  // Right goal
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(W-FIELD_PAD, GOAL_Y, GOAL_W, GOAL_H);
  ctx.strokeRect(W-FIELD_PAD, GOAL_Y, GOAL_W, GOAL_H);

  // Goal posts glow
  ctx.shadowColor='#fff';
  ctx.shadowBlur=8;
  ctx.strokeStyle='#fff';
  ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(FIELD_PAD,GOAL_Y); ctx.lineTo(FIELD_PAD,GOAL_Y+GOAL_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-FIELD_PAD,GOAL_Y); ctx.lineTo(W-FIELD_PAD,GOAL_Y+GOAL_H); ctx.stroke();
  ctx.shadowBlur=0;

  // Players
  for(const pl of players) {
    // Shadow
    ctx.beginPath();
    ctx.ellipse(pl.x, pl.y+pl.r, pl.r*0.9, pl.r*0.3, 0, 0, Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.arc(pl.x, pl.y, pl.r, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(pl.x-4, pl.y-4, 1, pl.x, pl.y, pl.r);
    grad.addColorStop(0, pl.color);
    grad.addColorStop(1, pl.shirt);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Player indicator (P1/P2)
    if(!pl.ai) {
      ctx.shadowColor = pl.color;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(pl.x, pl.y, pl.r+4, 0, Math.PI*2);
      ctx.strokeStyle = pl.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // Ball shadow
  ctx.beginPath();
  ctx.ellipse(ball.x, ball.y+ball.r, ball.r*0.9, ball.r*0.3, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fill();

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  const bgrad = ctx.createRadialGradient(ball.x-3, ball.y-3, 1, ball.x, ball.y, ball.r);
  bgrad.addColorStop(0,'#fff');
  bgrad.addColorStop(0.5,'#ddd');
  bgrad.addColorStop(1,'#888');
  ctx.fillStyle = bgrad;
  ctx.fill();
  ctx.strokeStyle='#333';
  ctx.lineWidth=1;
  ctx.stroke();

  // Ball pentagon pattern
  ctx.fillStyle='rgba(0,0,0,0.25)';
  for(let i=0;i<5;i++) {
    const a = (i/5)*Math.PI*2;
    ctx.beginPath();
    ctx.arc(ball.x+Math.cos(a)*(ball.r*0.5), ball.y+Math.sin(a)*(ball.r*0.5), 2.5, 0, Math.PI*2);
    ctx.fill();
  }

  // Power indicator arc
  if(isPowerCharging && powerCharge > 0) {
    const p1 = players[0];
    ctx.beginPath();
    ctx.arc(p1.x, p1.y, p1.r+8, -Math.PI/2, -Math.PI/2 + powerCharge*Math.PI*2);
    ctx.strokeStyle = `hsl(${120-powerCharge*120},100%,55%)`;
    ctx.lineWidth = 4;
    ctx.stroke();
  }
}

// Start with menu shown
document.getElementById('screen-menu').classList.remove('hidden');
</script>
